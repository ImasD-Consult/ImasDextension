name: Build & Push Extensions

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master, dev]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        extension:
          - name: smartprint-pro
            dockerfile: extensions/smartprint-pro/Dockerfile
            image: smartprintPRO
            extension_url: https://extensions.imasd.dev/trimble/smartprintPRO

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.extension.image }}
          tags: |
            type=sha
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/dev' }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.extension.dockerfile }}
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            EXTENSION_URL=${{ matrix.extension.extension_url }}
            VITE_TRIMBLE_CONNECT_ORIGIN=${{ vars.VITE_TRIMBLE_CONNECT_ORIGIN }}
            TRIMBLE_CONNECT_ORIGIN=${{ vars.TRIMBLE_CONNECT_ORIGIN }}
            VITE_PSET_SERVICE_URI=${{ vars.VITE_PSET_SERVICE_URI }}
            VITE_PSET_LIB_ID=${{ vars.VITE_PSET_LIB_ID }}
            VITE_PSET_DEF_ID=${{ vars.VITE_PSET_DEF_ID }}
            VITE_PSET_PROPERTY_NAME=${{ vars.VITE_PSET_PROPERTY_NAME }}
            VITE_TRIMBLE_CONNECT_REGION=${{ vars.VITE_TRIMBLE_CONNECT_REGION }}
            TRIMBLE_CONNECT_REGION=${{ vars.TRIMBLE_CONNECT_REGION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  trigger-deploy-webhook:
    name: Trigger deploy webhook after successful build
    runs-on: ubuntu-latest
    needs: [build]
    if: |
      success() &&
      github.event_name != 'pull_request' &&
      (github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/master')
    environment: ${{ github.ref == 'refs/heads/dev' && 'development' || 'production' }}

    steps:
      - name: Compute services to restart
        run: |
          # Coolify / compose service names to restart (keep in sync with matrix extensions).
          printf '%s' '["extensions-smartprintpro"]' > services.json

      - name: Send deploy webhook
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
        run: |
          PAYLOAD=$(jq -n \
            --arg env "${{ github.ref_name }}" \
            --arg sha "${{ github.sha }}" \
            --arg repo "${{ github.repository }}" \
            --slurpfile srv services.json \
            '{status:"success",environment:$env,sha:$sha,repo:$repo,services:$srv[0]}')

          SIGNATURE="sha256=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | awk '{print $2}')"

          curl -fsSL -X POST "$DEPLOY_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: $SIGNATURE" \
            -d "$PAYLOAD"
        shell: bash
