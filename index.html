<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>smartprintPRO</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; margin: 0; padding: 16px; }
    h2 { margin: 0 0 8px; font-size: 1.25rem; }
    .subtitle { color: #666; font-size: 0.875rem; margin: 0 0 16px; }
    .error { color: #c00; }
    .error-banner { background: #fff3cd; padding: 8px 12px; border-radius: 6px; margin-bottom: 12px; font-size: 0.875rem; }
    .error-banner.error { color: #c00; }
    .empty, .loading { color: #666; font-style: italic; }
    .processes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
    }
    .process-card {
      padding: 12px 16px;
      background: #f5f5f5;
      border-radius: 8px;
      font-weight: 500;
      cursor: default;
      transition: background 0.15s;
    }
    .process-card:hover { background: #e8e8e8; }
    .info-section { margin: 16px 0; }
    .info-section h3 { font-size: 1rem; margin: 0 0 8px; color: #333; }
    .placeholder { color: #888; font-style: italic; font-size: 0.875rem; }
  </style>
</head>
<body>
  <div id="app">
    <h2>smartprintPRO</h2>
    <p id="status">Connecting to Trimble Connect...</p>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
